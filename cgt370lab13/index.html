<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lab 13 - Power Plants</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

<h2>Size and Energy Type vs Year Built</h2>
<svg id="scatter" width="900" height="500"></svg>

<h2>Cumulative Plant Counts by Energy Type per Decade</h2>
<svg id="stackedbar" width="900" height="500"></svg>

<script>
d3.csv("power_plants.csv").then(function(data) {

//converting string to number
  data.forEach(d => {
    d.year_built = +d.year_built;
    d.capacity_mw = +d.capacity_mw;
    d.decade = Math.floor(d.year_built / 10) * 10;
  });

  const energyTypes = ["Coal","Hydro","Nuclear","Gas","Wind","Solar"];

  const color = d3.scaleOrdinal()
      .domain(energyTypes)
      .range(d3.schemeCategory10);

  const scatterSvg = d3.select("#scatter");
  const scatterWidth = 850;
  const scatterHeight = 500;

  const xScatter = d3.scaleLinear()
      .domain([1970, d3.max(data, d => d.year_built)]) 
      .range([70, scatterWidth - 150]);

  const yScatter = d3.scaleLinear()
      .domain([0, d3.max(data, d => d.capacity_mw)])
      .range([scatterHeight - 70, 50]);

  scatterSvg.append("g")
      .attr("transform", `translate(0,${scatterHeight - 70})`)
      .call(d3.axisBottom(xScatter).tickFormat(d3.format("d"))); 

  scatterSvg.append("g")
      .attr("transform", `translate(70,0)`)
      .call(d3.axisLeft(yScatter));

  scatterSvg.append("text")
      .attr("x", scatterWidth / 2)
      .attr("y", scatterHeight - 20)
      .attr("text-anchor", "middle")
      .attr("font-size", "16px")
      .text("Year Built");

  scatterSvg.append("text")
      .attr("transform", "rotate(-90)")
      .attr("x", -scatterHeight / 2)
      .attr("y", 25)
      .attr("text-anchor", "middle")
      .attr("font-size", "16px")
      .text("Capacity (MW)");

  scatterSvg.selectAll("circle")
      .data(data)
      .enter()
      .append("circle")
      .attr("cx", d => xScatter(d.year_built))
      .attr("cy", d => yScatter(d.capacity_mw))
      .attr("r", 5)
      .attr("fill", d => color(d.energy_type))
      .attr("stroke", "black");

// legend
  const scatterLegend = scatterSvg.selectAll(".legend")
      .data(energyTypes)
      .enter()
      .append("g")
      .attr("transform", (d,i) => `translate(${scatterWidth - 200},${70 + i*25})`);

  scatterLegend.append("rect")
      .attr("width", 15)
      .attr("height", 15)
      .attr("fill", d => color(d));

  scatterLegend.append("text")
      .attr("x", 20)
      .attr("y", 12)
      .text(d => d);

  const barSvg = d3.select("#stackedbar");
  const barWidth = 850;
  const barHeight = 500;

  const nestedCounts = d3.rollups(
    data,
    v => v.length,
    d => d.decade,
    d => d.energy_type
  );

  let stackedData = nestedCounts.map(([decade, typeMap]) => {
    const obj = {decade: decade};
    energyTypes.forEach(type => {
      obj[type] = 0; 
    });
    typeMap.forEach(([type, count]) => { obj[type] = count; });
    return obj;
  });

  stackedData.sort((a,b) => a.decade - b.decade);

  for (let i = 1; i < stackedData.length; i++) {
    energyTypes.forEach(type => {
      stackedData[i][type] += stackedData[i-1][type];
    });
  }

  const xBar = d3.scaleBand()
      .domain(stackedData.map(d => d.decade))
      .range([70, barWidth - 100])
      .padding(0.2);

  const yBar = d3.scaleLinear()
      .domain([0, d3.max(stackedData, d => d3.sum(energyTypes, type => d[type]))])
      .range([barHeight - 70, 50]);

  const stackGen = d3.stack()
      .keys(energyTypes);

  const series = stackGen(stackedData);

  barSvg.append("g")
    .selectAll("g")
    .data(series)
    .enter()
    .append("g")
      .attr("fill", d => color(d.key))
    .selectAll("rect")
    .data(d => d)
    .enter()
    .append("rect")
      .attr("x", d => xBar(d.data.decade))
      .attr("y", d => yBar(d[1]))
      .attr("height", d => yBar(d[0]) - yBar(d[1]))
      .attr("width", xBar.bandwidth());

  barSvg.append("g")
      .attr("transform", `translate(0,${barHeight - 70})`)
      .call(d3.axisBottom(xBar).tickFormat(d => d + "s"));

  barSvg.append("g")
      .attr("transform", "translate(70,0)")
      .call(d3.axisLeft(yBar));

  barSvg.append("text")
      .attr("x", barWidth / 2)
      .attr("y", barHeight - 20)
      .attr("text-anchor", "middle")
      .attr("font-size", "16px")
      .text("Decade");

  barSvg.append("text")
      .attr("transform", "rotate(-90)")
      .attr("x", -barHeight / 2)
      .attr("y", 25)
      .attr("text-anchor", "middle")
      .attr("font-size", "16px")
      .text("Cumulative Number of Plants");

  const barLegend = barSvg.selectAll(".legend")
      .data(energyTypes)
      .enter()
      .append("g")
      .attr("transform", (d,i) => `translate(80,${20 + i*25})`); 

  barLegend.append("rect")
      .attr("width", 15)
      .attr("height", 15)
      .attr("fill", d => color(d));

  barLegend.append("text")
      .attr("x", 20)
      .attr("y", 12)
      .text(d => d);

});
</script>

</body>
</html>
