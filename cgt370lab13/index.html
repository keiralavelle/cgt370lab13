<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lab 13 - Power Plants</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

<h2>Size and Energy Type vs Year Built</h2>

<svg width="800" height="500"></svg>

<script>

const svg = d3.select("svg");
const width = 750;
const height = 500;

d3.csv("power_plants.csv").then(function(data) {

//converting string to number
  data.forEach(function(d) {
    d.year_built = +d.year_built;
    d.capacity_mw = +d.capacity_mw;
  });

  const energyTypes = [...new Set(data.map(d => d.energy_type))];

  const color = d3.scaleOrdinal()
      .domain(energyTypes)
      .range(d3.schemeCategory10);

  const x = d3.scaleLinear()
      .domain(d3.extent(data, d => d.year_built))
      .range([70, width - 150]);

  const y = d3.scaleLinear()
      .domain([0, d3.max(data, d => d.capacity_mw)])
      .range([height - 70, 50]);

  svg.append("g")
     .attr("transform", "translate(0," + (height - 70) + ")")
     .call(d3.axisBottom(x));

  svg.append("g")
     .attr("transform", "translate(70,0)")
     .call(d3.axisLeft(y));

// x axis
  svg.append("text")
   .attr("x", width / 2)
   .attr("y", height - 20)
   .attr("text-anchor", "middle")
   .attr("font-size", "16px")
   .text("Year Built");

//y axis
  svg.append("text")
    .attr("transform", "rotate(-90)")
    .attr("x", -height / 2)
    .attr("y", 25)  
    .attr("text-anchor", "middle")
    .text("Capacity (MW)");

  svg.selectAll("circle")
     .data(data)
     .enter()
     .append("circle")
     .attr("cx", d => x(d.year_built))
     .attr("cy", d => y(d.capacity_mw))
     .attr("r", 5)
     .attr("fill", d => color(d.energy_type))
     .attr("stroke", "black");

//legend
const legend = svg.selectAll(".legend")
      .data(energyTypes)
      .enter()
      .append("g")
      .attr("transform", (d,i) =>
          "translate(" + (width - 200) + "," + (70 + i*25) + ")"
      );

  legend.append("rect")
      .attr("width", 15)
      .attr("height", 15)
      .attr("fill", d => color(d));

  legend.append("text")
      .attr("x", 20)
      .attr("y", 12)
      .text(d => d);

});

</script>

</body>
</html>
